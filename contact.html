<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Undreamt Designs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Override page-hero to match contact form width and center */
    .contact-page-hero {
      max-width: 560px;
      margin: 0 auto;
      padding: 90px 48px 48px;
      text-align: center;
    }

    .contact-page-hero .eyebrow {
      margin-bottom: 16px;
    }

    .contact-page-hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 400;
      color: #E8EAF0;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 12px;
    }

    .contact-page-hero p {
      font-size: 16px;
      font-weight: 300;
      color: #5A6070;
      line-height: 1.75;
    }

    @media (max-width: 768px) {
      .contact-page-hero {
        padding: 60px 20px 36px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo-container">
      <img src="logo-trimmed.png" class="logo-img" alt="Undreamt Designs logo" />
      <span class="logo-text">Undreamt Designs</span>
    </div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-page-hero">
    <p class="eyebrow">Get in touch</p>
    <h1>Have a project in mind?</h1>
    <p>Let's talk about making it real.</p>
  </div>

  <section class="contact-section">
    <div class="contact-card">
      <div class="contact-field">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Jane Smith" />
      </div>
      <div class="contact-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="jane@example.com" />
      </div>
      <div class="contact-field">
        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Tell me about your practice..."></textarea>
      </div>
      <button>Send message →</button>
    </div>
  </section>

</body>
</html>
